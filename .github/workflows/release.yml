name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.draft }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from release title
        id: version
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module <<'EOF'
          import { parseVersionFromTitle } from "./scripts/set-version.mjs";

          const title = process.env.RELEASE_TITLE ?? "";
          const tag = process.env.RELEASE_TAG ?? "";
          const version =
            parseVersionFromTitle(title) ??
            parseVersionFromTitle(tag.replace(/^refs\/tags\//, ""));

          if (!version) {
            console.error(
              `Could not parse semver from release title "${title}" or tag "${tag}".`,
            );
            console.error("Use a title like 1.0.0 or v1.0.0.");
            process.exit(1);
          }

          const fs = await import("node:fs");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          console.log(`Release version: ${version}`);
          EOF

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    if: ${{ !github.event.release.draft }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-arm
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-intel
            runner: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from release title
        run: node scripts/set-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Build desktop bundle
        run: pnpm --filter @spindeck/desktop exec tauri build -- --target ${{ matrix.target }}
        env:
          CI: true

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          bundle_root="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s globstar nullglob
          for file in \
            "$bundle_root"/**/*.msi \
            "$bundle_root"/**/*.exe \
            "$bundle_root"/**/*.deb \
            "$bundle_root"/**/*.AppImage \
            "$bundle_root"/**/*.dmg; do
            cp "$file" "release-assets/${{ matrix.platform }}-$(basename "$file")"
          done
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No bundle artifacts found under $bundle_root"
            find apps/desktop/src-tauri/target -type f | head -50
            exit 1
          fi
          ls -la release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
